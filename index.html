<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#12151a">
<title>Xe Hợp Đồng</title>
<link rel="manifest" id="mfLink">
<link rel="icon" id="icLink">
<link rel="apple-touch-icon" id="icApple">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<style>
:root{
  --nhua:#12151a; --than:#191d24; --panel:#20252e; --vach:#2c333d;
  --son:#e9ecf1; --mo:#8b95a5; --mo2:#5d6673;
  --bien:#f5c518; --bien-d:#c99f0a;
  --canh:#ff4d4f; --chay:#3ddc97; --xanh:#4aa8ff; --tim:#b085f5;
  --r:10px; --sp:12px;
  --fdisp:'Roboto Condensed','Arial Narrow',ui-sans-serif,system-ui,sans-serif;
  --fbody:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --fnum:ui-monospace,'Roboto Mono',Menlo,Consolas,monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--nhua);color:var(--son);font-family:var(--fbody);
  font-size:15px;line-height:1.45;overscroll-behavior-y:none;
  padding-bottom:calc(62px + env(safe-area-inset-bottom));
}
button,input,select,textarea{font:inherit;color:inherit}
:focus-visible{outline:2px solid var(--bien);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ---------- BIỂN SỐ: chi tiết chữ ký của app ---------- */
.plate{
  display:inline-flex;align-items:center;justify-content:center;
  background:linear-gradient(#ffdc4a,#efbe0b);color:#101010;
  font-family:var(--fdisp);font-weight:700;font-size:14px;letter-spacing:.6px;
  padding:3px 8px;border-radius:5px;border:1.5px solid #101010;
  box-shadow:inset 0 -2px 0 rgba(0,0,0,.18);white-space:nowrap;text-transform:uppercase;
}
.plate.sm{font-size:12px;padding:1px 6px;border-width:1px}
.plate.lg{font-size:19px;padding:5px 11px}

/* ---------- TOPBAR ---------- */
.topbar{
  position:sticky;top:0;z-index:40;background:rgba(18,21,26,.94);
  backdrop-filter:blur(8px);border-bottom:1px solid var(--vach);
  padding:calc(8px + env(safe-area-inset-top)) 12px 8px;
  display:flex;align-items:center;gap:10px;
}
.topbar h1{font-family:var(--fdisp);font-size:17px;margin:0;font-weight:700;letter-spacing:.3px;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .sub{display:block;font-family:var(--fbody);font-size:11px;color:var(--mo);font-weight:400;letter-spacing:0}
.sync{
  border:1px solid var(--vach);background:var(--than);color:var(--mo);
  border-radius:20px;padding:5px 11px;font-size:12px;display:flex;align-items:center;gap:6px;cursor:pointer
}
.sync.dirty{border-color:var(--bien);color:var(--bien)}
.sync .dot{width:7px;height:7px;border-radius:50%;background:var(--chay)}
.sync.dirty .dot{background:var(--bien);animation:pulse 1.4s infinite}
.sync.off .dot{background:var(--canh)}
@keyframes pulse{50%{opacity:.25}}

/* ---------- NAV ---------- */
.nav{
  position:fixed;left:0;right:0;bottom:0;z-index:50;display:grid;grid-template-columns:repeat(5,1fr);
  background:rgba(25,29,36,.97);backdrop-filter:blur(10px);border-top:1px solid var(--vach);
  padding-bottom:env(safe-area-inset-bottom);
}
.nav button{
  background:none;border:0;padding:8px 2px 9px;display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--mo2);font-size:10.5px;cursor:pointer;position:relative
}
.nav button svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.nav button.on{color:var(--bien)}
.nav button.on::before{content:"";position:absolute;top:0;left:22%;right:22%;height:2px;background:var(--bien);border-radius:0 0 3px 3px}
.nav .badge{position:absolute;top:4px;right:calc(50% - 20px);background:var(--canh);color:#fff;
  font-size:9px;font-weight:700;min-width:15px;height:15px;border-radius:8px;display:grid;place-items:center;padding:0 3px}

/* ---------- LAYOUT ---------- */
.view{display:none;padding:12px 12px 20px}
.view.on{display:block;animation:fade .18s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}}
.card{background:var(--than);border:1px solid var(--vach);border-radius:var(--r);padding:12px;margin-bottom:10px}
.card.tap{cursor:pointer}
.card.tap:active{background:var(--panel)}
.hd{display:flex;align-items:center;gap:8px;margin:16px 0 8px}
.hd:first-child{margin-top:2px}
.hd h2{font-family:var(--fdisp);font-size:13px;letter-spacing:1.4px;text-transform:uppercase;color:var(--mo);margin:0;font-weight:700}
.hd .line{flex:1;height:1px;background:var(--vach)}
.hd a,.hd .act{font-size:12px;color:var(--bien);text-decoration:none;cursor:pointer}
.mo{color:var(--mo)}.sm{font-size:12.5px}.xs{font-size:11.5px}
.num{font-family:var(--fnum);font-variant-numeric:tabular-nums}
.rowf{display:flex;align-items:center;gap:8px}
.rowf .grow{flex:1;min-width:0}
.trunc{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty{text-align:center;padding:34px 16px;color:var(--mo2)}
.empty b{display:block;color:var(--mo);font-size:14px;margin-bottom:4px;font-weight:600}

/* ---------- CHIP / BUTTON ---------- */
.chip{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;border:1px solid var(--vach);color:var(--mo);white-space:nowrap}
.chip.ok{color:var(--chay);border-color:rgba(61,220,151,.4);background:rgba(61,220,151,.09)}
.chip.warn{color:var(--bien);border-color:rgba(245,197,24,.4);background:rgba(245,197,24,.09)}
.chip.bad{color:var(--canh);border-color:rgba(255,77,79,.4);background:rgba(255,77,79,.1)}
.chip.run{color:var(--xanh);border-color:rgba(74,168,255,.4);background:rgba(74,168,255,.1)}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  background:var(--panel);border:1px solid var(--vach);color:var(--son);
  border-radius:9px;padding:10px 14px;font-size:14px;cursor:pointer;font-weight:500
}
.btn:active{transform:translateY(1px)}
.btn.pri{background:var(--bien);border-color:var(--bien);color:#141414;font-weight:700}
.btn.dan{color:var(--canh);border-color:rgba(255,77,79,.45)}
.btn.blk{width:100%}
.btn.sm{padding:6px 10px;font-size:12.5px;border-radius:7px}
.btns{display:flex;gap:8px}.btns>*{flex:1}
.fab{
  position:fixed;right:14px;bottom:calc(72px + env(safe-area-inset-bottom));z-index:45;
  width:52px;height:52px;border-radius:50%;background:var(--bien);color:#141414;border:0;
  font-size:28px;line-height:1;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.5);display:none;place-items:center
}
.fab.on{display:grid}

/* ---------- FORM ---------- */
.f{margin-bottom:11px}
.f label{display:block;font-size:11.5px;color:var(--mo);margin-bottom:4px;letter-spacing:.2px}
.f label .req{color:var(--canh)}
.f input,.f select,.f textarea{
  width:100%;background:var(--nhua);border:1px solid var(--vach);border-radius:8px;
  padding:10px 11px;font-size:15px;color:var(--son)
}
.f textarea{min-height:64px;resize:vertical}
.f input::placeholder{color:var(--mo2)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.f .hint{font-size:11px;color:var(--mo2);margin-top:3px}
.f.err input,.f.err select{border-color:var(--canh)}

/* ---------- SHEET / MODAL ---------- */
.mask{position:fixed;inset:0;background:rgba(0,0,0,.66);z-index:60;display:none}
.mask.on{display:block}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:61;background:var(--than);
  border-radius:16px 16px 0 0;border-top:1px solid var(--vach);
  max-height:92vh;display:none;flex-direction:column;transform:translateY(100%)
}
.sheet.on{display:flex;animation:up .22s cubic-bezier(.2,.9,.3,1) forwards}
@keyframes up{to{transform:translateY(0)}}
.sheet-h{padding:14px 14px 10px;border-bottom:1px solid var(--vach);display:flex;align-items:center;gap:10px}
.sheet-h h3{margin:0;font-family:var(--fdisp);font-size:17px;flex:1;font-weight:700}
.sheet-h .x{background:none;border:0;color:var(--mo);font-size:26px;line-height:1;cursor:pointer;padding:0 4px}
.sheet-b{padding:14px;overflow:auto;-webkit-overflow-scrolling:touch}
.sheet-f{padding:12px 14px calc(12px + env(safe-area-inset-bottom));border-top:1px solid var(--vach);display:flex;gap:8px}
.sheet-f>*{flex:1}

/* ---------- LỊCH ĐIỀU XE (làn đường) ---------- */
.lich-wrap{border:1px solid var(--vach);border-radius:var(--r);overflow:hidden;background:var(--than)}
.lich-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.lich{min-width:640px}
.lich-head{display:flex;background:var(--panel);border-bottom:1px solid var(--vach);position:sticky;top:0;z-index:2}
.lich-head .cell,.lane .cell{flex:1 0 84px;padding:6px 4px;text-align:center;font-size:11px;border-left:1px solid var(--vach)}
.lich-head .cell b{display:block;font-family:var(--fdisp);font-size:15px}
.lich-head .cell.today{background:rgba(245,197,24,.13);color:var(--bien)}
.lich-head .fix,.lane .fix{
  flex:0 0 108px;position:sticky;left:0;z-index:3;background:var(--panel);
  padding:6px 8px;border-right:1px solid var(--vach);display:flex;align-items:center
}
.lane{display:flex;border-bottom:1px solid var(--vach);min-height:52px;position:relative}
.lane:last-child{border-bottom:0}
.lane .fix{background:var(--than);flex-direction:column;align-items:flex-start;justify-content:center;gap:2px}
.lane .cell{border-left:1px dashed var(--vach);padding:4px 3px;display:flex;flex-direction:column;gap:3px;justify-content:center}
.blk{
  background:rgba(74,168,255,.16);border-left:3px solid var(--xanh);border-radius:4px;
  padding:3px 5px;font-size:10.5px;line-height:1.25;cursor:pointer;text-align:left;overflow:hidden
}
.blk b{display:block;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.blk.done{background:rgba(61,220,151,.13);border-color:var(--chay)}
.blk.cancel{background:rgba(139,149,165,.12);border-color:var(--mo2);text-decoration:line-through;opacity:.65}
.blk.clash{background:repeating-linear-gradient(45deg,rgba(255,77,79,.22) 0 6px,rgba(255,77,79,.08) 6px 12px);border-color:var(--canh)}
.lane .fix .stt{width:7px;height:7px;border-radius:50%;background:var(--chay);position:absolute;left:4px;top:6px}
.lich-legend{display:flex;gap:12px;flex-wrap:wrap;padding:8px 10px;font-size:11px;color:var(--mo);border-top:1px solid var(--vach)}
.lich-legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:4px;vertical-align:-1px}

/* ---------- LIST ITEM ---------- */
.item{display:flex;gap:10px;padding:11px 0;border-bottom:1px solid var(--vach);cursor:pointer}
.item:last-child{border-bottom:0}
.item .l{flex:1;min-width:0}
.item .r{text-align:right;flex-shrink:0}
.item .t{font-weight:600;font-size:14.5px}
.item .d{font-size:12px;color:var(--mo);margin-top:2px}
.money{font-family:var(--fnum);font-weight:700;font-size:14.5px}
.money.in{color:var(--chay)}.money.out{color:var(--canh)}

/* ---------- ALERT BANNER ---------- */
.alert{display:flex;gap:9px;align-items:flex-start;background:rgba(255,77,79,.09);border:1px solid rgba(255,77,79,.32);
  border-radius:var(--r);padding:10px 11px;margin-bottom:10px;font-size:13px}
.alert.warn{background:rgba(245,197,24,.08);border-color:rgba(245,197,24,.32)}
.alert b{display:block;margin-bottom:2px}
.alert .ic{font-size:15px;line-height:1.2}

/* ---------- TOAST ---------- */
#toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(78px + env(safe-area-inset-bottom));
  background:var(--panel);border:1px solid var(--vach);color:var(--son);padding:10px 16px;border-radius:22px;
  font-size:13.5px;z-index:90;opacity:0;pointer-events:none;transition:opacity .2s;max-width:88vw;text-align:center}
#toast.on{opacity:1}
#toast.bad{border-color:var(--canh);color:#ffd7d7}

/* ---------- GATE (đăng nhập / hết hạn) ---------- */
#gate{position:fixed;inset:0;background:var(--nhua);z-index:100;display:none;overflow:auto}
#gate.on{display:block}
.gate-in{max-width:400px;margin:0 auto;padding:44px 22px}
.gate-logo{text-align:center;margin-bottom:26px}
.gate-logo .plate{font-size:22px;padding:7px 14px}
.gate-logo p{color:var(--mo);font-size:12.5px;margin:12px 0 0;letter-spacing:2.6px;text-transform:uppercase;font-family:var(--fdisp)}
.tabs{display:flex;background:var(--than);border:1px solid var(--vach);border-radius:9px;padding:3px;margin-bottom:16px}
.tabs button{flex:1;background:none;border:0;padding:8px;border-radius:7px;color:var(--mo);font-size:13.5px;cursor:pointer}
.tabs button.on{background:var(--bien);color:#141414;font-weight:700}
.qr-box{background:#fff;border-radius:10px;padding:10px;text-align:center;margin:10px 0}
.qr-box img{width:100%;max-width:250px;display:block;margin:0 auto}
.kv{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid var(--vach);font-size:13.5px}
.kv:last-child{border-bottom:0}
.kv .k{color:var(--mo)}
.kv .v{text-align:right;font-weight:600;word-break:break-word}
.kv .v.copy{cursor:pointer;color:var(--bien)}

/* ---------- IN ẤN: hợp đồng + danh sách hành khách ---------- */
#print{display:none}
@media print{
  body{background:#fff;color:#000;padding:0;font-size:12pt}
  .topbar,.nav,.fab,.view,.sheet,.mask,#gate,#toast{display:none!important}
  #print{display:block;padding:0}
  .p-page{page-break-after:always;padding:10mm 8mm}
  .p-page:last-child{page-break-after:auto}
  .p-h{text-align:center;margin-bottom:10px}
  .p-h .qh{font-size:11pt;font-weight:700}
  .p-h .dl{font-size:11pt;border-bottom:1px solid #000;display:inline-block;padding-bottom:2px}
  .p-t{text-align:center;font-size:15pt;font-weight:700;margin:14px 0 2px}
  .p-s{text-align:center;font-size:10pt;margin-bottom:12px}
  .p-b{font-size:11.5pt;line-height:1.6}
  .p-b h4{margin:10px 0 4px;font-size:11.5pt}
  .p-b table{width:100%;border-collapse:collapse;margin:6px 0}
  .p-b td,.p-b th{border:1px solid #000;padding:4px 6px;font-size:10.5pt;text-align:left}
  .p-sign{display:flex;justify-content:space-between;margin-top:26px;text-align:center;font-size:11pt}
  .p-sign div{width:46%}
  .p-sign b{display:block}
  .p-sign span{display:block;color:#555;font-size:9.5pt;font-style:italic;margin-bottom:52px}
}
</style>
</head>
<body>

<!-- ============ CỔNG: đăng nhập / dùng thử / gia hạn ============ -->
<div id="gate" class="on"><div class="gate-in">
  <div class="gate-logo">
    <span class="plate">XE HỢP ĐỒNG</span>
    <p>Quản lý chuyến &amp; hợp đồng</p>
  </div>
  <div id="gateBody"></div>
</div></div>

<!-- ============ APP ============ -->
<header class="topbar" id="topbar" style="display:none">
  <h1 id="tenDV">Nhà xe<span class="sub" id="hanDung">—</span></h1>
  <button class="sync" id="btnSync"><span class="dot"></span><span id="syncTxt">Đã lưu</span></button>
</header>

<!-- 1. LỊCH ĐIỀU XE -->
<section class="view" id="v-lich">
  <div id="canhBao"></div>
  <div class="hd"><h2>Lịch điều xe</h2><span class="line"></span><span class="act" id="lichPrev">‹</span><span class="act" id="lichNext">›</span></div>
  <div class="lich-wrap">
    <div class="lich-scroll"><div class="lich" id="lichBody"></div></div>
    <div class="lich-legend">
      <span><i style="background:var(--xanh)"></i>Đã lên lịch</span>
      <span><i style="background:var(--chay)"></i>Hoàn thành</span>
      <span><i style="background:var(--canh)"></i>Trùng xe</span>
      <span><i style="background:var(--mo2)"></i>Đã hủy</span>
    </div>
  </div>
  <div class="hd"><h2>Chạy hôm nay</h2><span class="line"></span></div>
  <div class="card" id="homNay"></div>
</section>

<!-- 2. HỢP ĐỒNG -->
<section class="view" id="v-hd">
  <div class="hd"><h2>Hợp đồng vận chuyển</h2><span class="line"></span></div>
  <div class="f"><input id="timHD" placeholder="Tìm mã HĐ, khách, biển số…"></div>
  <div class="card" id="dsHD"></div>
</section>

<!-- 3. CHUYẾN -->
<section class="view" id="v-chuyen">
  <div class="hd"><h2>Chuyến xe</h2><span class="line"></span>
    <select id="locChuyen" style="background:var(--than);border:1px solid var(--vach);border-radius:7px;padding:4px 7px;font-size:12px">
      <option value="7">7 ngày tới</option><option value="0">Hôm nay</option>
      <option value="30">30 ngày tới</option><option value="-30">30 ngày qua</option><option value="all">Tất cả</option>
    </select>
  </div>
  <div class="card" id="dsChuyen"></div>
</section>

<!-- 4. XE & TÀI XẾ -->
<section class="view" id="v-xe">
  <div class="tabs" id="tabXe">
    <button class="on" data-t="xe">Xe</button><button data-t="tx">Tài xế</button><button data-t="kh">Khách hàng</button>
  </div>
  <div class="card" id="dsXe"></div>
</section>

<!-- 5. THU CHI -->
<section class="view" id="v-tien">
  <div class="hd"><h2>Kết quả tháng</h2><span class="line"></span>
    <input type="month" id="thangBC" style="background:var(--than);border:1px solid var(--vach);border-radius:7px;padding:4px 7px;font-size:12px;color:var(--son)">
  </div>
  <div id="bcTong"></div>
  <div class="hd"><h2>Lãi lỗ theo xe</h2><span class="line"></span></div>
  <div class="card" id="bcXe"></div>
  <div class="hd"><h2>Công nợ khách</h2><span class="line"></span></div>
  <div class="card" id="bcNo"></div>
  <div class="hd"><h2>Sổ thu chi</h2><span class="line"></span><span class="act" id="themThuChi">+ Phiếu</span></div>
  <div class="card" id="dsThuChi"></div>
  <div class="hd"><h2>Hệ thống</h2><span class="line"></span></div>
  <div class="btns" style="flex-direction:column">
    <button class="btn blk" id="btnCauHinh">Thông tin đơn vị vận tải</button>
    <button class="btn blk" id="btnGiaHan">Gói thuê &amp; gia hạn</button>
    <button class="btn blk" id="btnXuat">Xuất sao lưu (JSON)</button>
    <button class="btn blk dan" id="btnThoat">Đăng xuất</button>
  </div>
  <p class="xs mo" style="text-align:center;margin-top:14px" id="verTxt"></p>
</section>

<button class="fab" id="fab">+</button>

<!-- NAV -->
<nav class="nav" id="nav" style="display:none">
  <button data-v="lich" class="on"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>Lịch xe</button>
  <button data-v="hd"><svg viewBox="0 0 24 24"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5M9 13h6M9 17h4"/></svg>Hợp đồng</button>
  <button data-v="chuyen"><svg viewBox="0 0 24 24"><path d="M3 17V7a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v10"/><path d="M17 9h2.5L22 13v4h-5"/><circle cx="7.5" cy="17.5" r="1.8"/><circle cx="17.5" cy="17.5" r="1.8"/></svg>Chuyến</button>
  <button data-v="xe"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.4"/><path d="M4.5 20a7.5 7.5 0 0 1 15 0"/></svg>Xe &amp; TX</button>
  <button data-v="tien"><svg viewBox="0 0 24 24"><rect x="2.5" y="6" width="19" height="12" rx="2"/><circle cx="12" cy="12" r="2.6"/><path d="M6 12h.01M18 12h.01"/></svg>Thu chi</button>
</nav>

<!-- SHEET -->
<div class="mask" id="mask"></div>
<div class="sheet" id="sheet">
  <div class="sheet-h"><h3 id="shT">—</h3><button class="x" id="shX">×</button></div>
  <div class="sheet-b" id="shB"></div>
  <div class="sheet-f" id="shF"></div>
</div>

<div id="toast"></div>
<div id="print"></div>
<script type="module">
/* ==================================================================
   XE HỢP ĐỒNG — app quản lý xe hợp đồng (bản 1.0)
   Kho riêng, chạy trên GitHub Pages, dùng chung Firebase với các app khác.
   ⚠️ SỬA 3 CHỖ TRONG KHỐI CFG BÊN DƯỚI TRƯỚC KHI DEPLOY.
   ================================================================== */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword,
         sendPasswordResetEmail, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, writeBatch, deleteDoc, addDoc,
         enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const CFG = {
  /* (1) DÁN Y NGUYÊN firebaseConfig CỦA DỰ ÁN so-no-cc57a TỪ APP NHÀXE PRO */
  fb: {
    apiKey:"PASTE_API_KEY", authDomain:"so-no-cc57a.firebaseapp.com",
    projectId:"so-no-cc57a", storageBucket:"so-no-cc57a.appspot.com",
    messagingSenderId:"PASTE_SENDER_ID", appId:"PASTE_APP_ID"
  },
  /* (2) THÔNG TIN NHẬN TIỀN — hiện trên mã VietQR khi khách gia hạn */
  bank:{ bin:"970416", stk:"PASTE_SO_TAI_KHOAN", ten:"PASTE TEN CHU TAI KHOAN" },
  gia:{ thang:200000, quy:540000, nam:1900000 },
  /* (3) ngày dùng thử miễn phí cấp tự động cho tài khoản mới */
  thuThu: 7,
  hotline:"PASTE_SO_HOTLINE",
  adminUid:"PASTE_UID_ADMIN",
  app:"hd", ver:"1.0.0"
};

const fbApp = initializeApp(CFG.fb);
const auth  = getAuth(fbApp);
const fdb   = getFirestore(fbApp);
try{ enableIndexedDbPersistence(fdb).catch(()=>{}); }catch(e){}

/* ------------------------------ tiện ích ------------------------------ */
const $  = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const esc = s => String(s??"").replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const nid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const num = v => { const n = Number(String(v??"").replace(/[^\d.-]/g,"")); return isFinite(n)?n:0; };
const tien = v => num(v).toLocaleString("vi-VN");
const hnay = () => new Date().toISOString().slice(0,10);
const ngayVN = s => s ? s.slice(0,10).split("-").reverse().join("/") : "";
const gioVN  = s => s && s.length>10 ? s.slice(11,16) : "";
const dt = s => s ? new Date(s.length>10 ? s : s+"T00:00") : null;
const themNgay = (s,n)=>{ const d=dt(s); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); };
const cachNgay = (a,b)=> Math.round((dt(a)-dt(b))/864e5);
const THU = ["CN","T2","T3","T4","T5","T6","T7"];
const dToS = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const chuanNgay = v => !v ? "" : (typeof v==="string" ? v.slice(0,10) : dToS(v.toDate ? v.toDate() : new Date(v)));
const SO_NGAY_AN_HAN = 3;   // rules cho ân hạn 3 ngày sau khi hết hạn

let tId; function toast(m,bad){ const t=$("#toast"); t.textContent=m; t.className="on"+(bad?" bad":"");
  clearTimeout(tId); tId=setTimeout(()=>t.className="",2400); }

/* ------------------------------ STORE ------------------------------
   Nạp toàn bộ dữ liệu 1 lần, sửa trên RAM, ghi theo lô khi có thay đổi
   thật (so với bản chụp _shadow) → tiết kiệm lượt ghi Firestore.
   -------------------------------------------------------------------- */
const COLS = ["xe","tx","kh","hopdong","chuyen","chiphi","thuchi"];
const DB = {}; COLS.forEach(c=>DB[c]=[]);
let CH = {};                       // cấu hình đơn vị vận tải
let SH = {}, XOA = {}, UID = null, LIC = null;

const duong = c => `users/${UID}/${CFG.app}_${c}`;   // users/{uid}/hd_xe … khớp appCua() trong rules
const chup  = () => { SH={}; COLS.forEach(c=>{ SH[c]={}; DB[c].forEach(o=>SH[c][o.id]=JSON.stringify(o)); }); SH.__ch=JSON.stringify(CH); };
const khoaCache = () => `${CFG.app}_cache_${UID}`;

const STORE = {
  ban:new Set(), dangGhi:false, hen:null,

  async nap(){
    try{
      const rs = await Promise.all(COLS.map(c=>getDocs(collection(fdb, duong(c)))));
      COLS.forEach((c,i)=>{ DB[c] = rs[i].docs.map(d=>({id:d.id, ...d.data()})); });
      const cd = await getDoc(doc(fdb, duong("cauhinh"), "main"));
      CH = cd.exists() ? cd.data() : {};
      chup(); XOA={}; this.ban.clear();
      localStorage.setItem(khoaCache(), JSON.stringify({DB,CH,t:Date.now()}));
      return true;
    }catch(e){
      const c = localStorage.getItem(khoaCache());
      if(c){ const o=JSON.parse(c); COLS.forEach(k=>DB[k]=o.DB[k]||[]); CH=o.CH||{}; chup();
             toast("Đang xem bản lưu trên máy — chưa có mạng"); return true; }
      throw e;
    }
  },

  luu(c, o){                       // thêm mới hoặc cập nhật 1 bản ghi
    if(!o.id){ o.id = nid(); o.tao = new Date().toISOString(); DB[c].push(o); }
    else { const i = DB[c].findIndex(x=>x.id===o.id); i<0 ? DB[c].push(o) : DB[c][i]=o; }
    this.banRuc(c); return o;
  },
  xoa(c, id){
    DB[c] = DB[c].filter(x=>x.id!==id);
    (XOA[c] = XOA[c]||[]).push(id);
    this.banRuc(c);
  },
  banRuc(c){ this.ban.add(c); capNhatNutLuu(); },

  async ghi(im){                   // ghi thật xuống Firestore
    if(this.dangGhi || !UID) return;
    const viec = [];                                   // gom việc cần ghi
    for(const c of COLS){
      for(const o of DB[c]){ const j=JSON.stringify(o); if(SH[c]?.[o.id]!==j) viec.push(["set",duong(c),o.id,o]); }
      for(const id of (XOA[c]||[])) viec.push(["del",duong(c),id]);
    }
    if(JSON.stringify(CH)!==SH.__ch) viec.push(["set",duong("cauhinh"),"main",CH]);
    const n = viec.length;
    if(!n){ this.ban.clear(); capNhatNutLuu(); return; }
    this.dangGhi = true; capNhatNutLuu();
    try{
      for(let i=0;i<n;i+=400){                         // Firestore giới hạn 500 thao tác / lô
        const b = writeBatch(fdb);
        viec.slice(i,i+400).forEach(([kieu,d,id,o])=> kieu==="set" ? b.set(doc(fdb,d,id),o) : b.delete(doc(fdb,d,id)));
        await b.commit();
      }
      chup(); XOA={}; this.ban.clear();
      localStorage.setItem(khoaCache(), JSON.stringify({DB,CH,t:Date.now()}));
      if(!im) toast("Đã lưu " + n + " thay đổi");
    }catch(e){ toast("Chưa lưu được — sẽ thử lại khi có mạng", 1); console.error(e); }
    finally{ this.dangGhi = false; capNhatNutLuu(); }
  },
  ghiMem(){ clearTimeout(this.hen); this.hen = setTimeout(()=>this.ghi(true), 1500); }  // không chặn giao diện
};
function capNhatNutLuu(){
  const b=$("#btnSync"), t=$("#syncTxt"); if(!b) return;
  if(STORE.dangGhi){ b.className="sync dirty"; t.textContent="Đang lưu…"; }
  else if(STORE.ban.size){ b.className="sync dirty"; t.textContent="Lưu ngay"; }
  else if(!navigator.onLine){ b.className="sync off"; t.textContent="Ngoại tuyến"; }
  else { b.className="sync"; t.textContent="Đã lưu"; }
}
window.addEventListener("online", ()=>{ capNhatNutLuu(); STORE.ghi(true); });
window.addEventListener("offline", capNhatNutLuu);
window.addEventListener("beforeunload", e=>{ if(STORE.ban.size){ e.preventDefault(); e.returnValue=""; } });

/* ------------------------------ GIẤY PHÉP ------------------------------ */
async function docGiayPhep(){
  const r = doc(fdb, `accounts/${UID}/lic`, CFG.app);
  const s = await getDoc(r);
  if(s.exists()){
    const d = s.data();
    return { ...d, khoa: d.active === false,
             goi: d.goi || (d.trial ? "dùng thử" : "đã thanh toán"),
             hanDen: chuanNgay(d.paidUntil) };        // không có paidUntil = vĩnh viễn
  }
  // Tài khoản mới: tự cấp bản dùng thử, đúng khuôn quy tắc đang chạy
  // (trial + trialUsed + paidUntil kiểu timestamp, dưới 16 ngày, tạo đúng 1 lần).
  const d0 = new Date(); d0.setDate(d0.getDate() + CFG.thuThu); d0.setHours(23,59,0,0);
  await setDoc(r, { app:CFG.app, trial:true, trialUsed:true, paidUntil:d0, createdAt:new Date() });
  try{ await setDoc(doc(fdb,"accounts",UID), { email:auth.currentUser?.email||"", createdAt:new Date() }); }catch(e){}
  return { app:CFG.app, goi:"dùng thử", hanDen: dToS(d0) };
}
const conHan = l => !!l && !l.khoa && (!l.hanDen || cachNgay(l.hanDen, hnay()) >= 0);

/* ------------------------------ CỔNG VÀO ------------------------------ */
function moCong(html){ $("#gate").classList.add("on"); $("#gateBody").innerHTML = html; }
function dongCong(){ $("#gate").classList.remove("on"); $("#topbar").style.display="flex"; $("#nav").style.display="grid"; }

function congDangNhap(che){
  moCong(`
    <div class="tabs" id="tbAuth"><button class="on" data-m="in">Đăng nhập</button><button data-m="up">Tạo tài khoản</button></div>
    <div class="f"><label>Email</label><input id="aEmail" type="email" autocomplete="username" placeholder="nhaxe@gmail.com"></div>
    <div class="f"><label>Mật khẩu</label><input id="aPass" type="password" autocomplete="current-password" placeholder="ít nhất 6 ký tự"></div>
    <button class="btn pri blk" id="aGo" style="margin-top:6px">Đăng nhập</button>
    <p class="xs mo" style="text-align:center;margin-top:12px"><span class="act" id="aQuen" style="color:var(--bien);cursor:pointer">Quên mật khẩu</span></p>
    <p class="xs mo" style="text-align:center;margin-top:26px">Dùng thử ${CFG.thuThu} ngày, không cần thẻ.<br>Hỗ trợ: ${esc(CFG.hotline)}</p>
    ${che?`<div class="alert" style="margin-top:16px"><span class="ic">!</span><div>${esc(che)}</div></div>`:""}
  `);
  let mode="in";
  $("#tbAuth").onclick = e=>{ const b=e.target.closest("button"); if(!b) return;
    $$("#tbAuth button").forEach(x=>x.classList.toggle("on", x===b)); mode=b.dataset.m;
    $("#aGo").textContent = mode==="in" ? "Đăng nhập" : "Tạo tài khoản"; };
  $("#aQuen").onclick = async ()=>{ const m=$("#aEmail").value.trim(); if(!m) return toast("Nhập email trước đã",1);
    try{ await sendPasswordResetEmail(auth,m); toast("Đã gửi link đặt lại mật khẩu"); }catch(e){ toast(loi(e),1); } };
  $("#aGo").onclick = async ()=>{
    const m=$("#aEmail").value.trim(), p=$("#aPass").value;
    if(!m||p.length<6) return toast("Thiếu email hoặc mật khẩu quá ngắn",1);
    $("#aGo").disabled=true; $("#aGo").textContent="Đang xử lý…";
    try{ mode==="in" ? await signInWithEmailAndPassword(auth,m,p) : await createUserWithEmailAndPassword(auth,m,p); }
    catch(e){ toast(loi(e),1); $("#aGo").disabled=false; $("#aGo").textContent = mode==="in"?"Đăng nhập":"Tạo tài khoản"; }
  };
}
const loi = e => ({
  "auth/invalid-credential":"Sai email hoặc mật khẩu",
  "auth/invalid-email":"Email không hợp lệ",
  "auth/email-already-in-use":"Email này đã có tài khoản",
  "auth/weak-password":"Mật khẩu cần từ 6 ký tự",
  "auth/network-request-failed":"Không có mạng",
  "auth/too-many-requests":"Thử lại sau ít phút"
}[e?.code] || "Lỗi: " + (e?.code||e?.message||e));

function congGiaHan(){
  const l = LIC||{}, con = l.hanDen ? cachNgay(l.hanDen, hnay()) : 9999;
  const noiDung = `${CFG.app.toUpperCase()} ${(auth.currentUser?.email||"").split("@")[0]}`.slice(0,45);
  const qr = g => `https://img.vietqr.io/image/${CFG.bank.bin}-${CFG.bank.stk}-compact2.png?amount=${CFG.gia[g]}&addInfo=${encodeURIComponent(noiDung)}&accountName=${encodeURIComponent(CFG.bank.ten)}`;
  moCong(`
    <div class="card">
      <div class="kv"><span class="k">Tài khoản</span><span class="v">${esc(auth.currentUser?.email||"")}</span></div>
      <div class="kv"><span class="k">Gói</span><span class="v">${esc(l.goi||"—")}</span></div>
      <div class="kv"><span class="k">Hạn dùng</span><span class="v" style="color:${con>=0?'var(--chay)':'var(--canh)'}">${l.hanDen?ngayVN(l.hanDen):"không giới hạn"} ${l.hanDen?(con>=0?`(còn ${con} ngày)`:"(đã hết hạn)"):""}</span></div>
    </div>
    <div class="tabs" id="tbGoi">
      <button class="on" data-g="thang">1 tháng</button><button data-g="quy">3 tháng</button><button data-g="nam">1 năm</button>
    </div>
    <div class="qr-box"><img id="imgQR" src="${qr('thang')}" alt="Mã VietQR chuyển khoản"></div>
    <div class="card">
      <div class="kv"><span class="k">Số tiền</span><span class="v num" id="soTien">${tien(CFG.gia.thang)} đ</span></div>
      <div class="kv"><span class="k">Số tài khoản</span><span class="v copy" data-c="${esc(CFG.bank.stk)}">${esc(CFG.bank.stk)}</span></div>
      <div class="kv"><span class="k">Chủ tài khoản</span><span class="v">${esc(CFG.bank.ten)}</span></div>
      <div class="kv"><span class="k">Nội dung bắt buộc</span><span class="v copy" data-c="${esc(noiDung)}">${esc(noiDung)}</span></div>
    </div>
    <p class="xs mo" style="margin:10px 0 14px">Chuyển đúng nội dung ở trên để bên mình đối soát. Sau khi chuyển, bấm nút báo bên dưới — tài khoản được mở lại trong ngày.</p>
    <button class="btn pri blk" id="baoCK">Tôi đã chuyển khoản</button>
    <button class="btn blk" id="ktLai" style="margin-top:8px">Kiểm tra lại / quay lại ứng dụng</button>
    <button class="btn blk dan" id="raNgoai" style="margin-top:8px">Đăng xuất</button>
  `);
  let goi="thang";
  $("#tbGoi").onclick = e=>{ const b=e.target.closest("button"); if(!b) return;
    $$("#tbGoi button").forEach(x=>x.classList.toggle("on",x===b)); goi=b.dataset.g;
    $("#imgQR").src=qr(goi); $("#soTien").textContent=tien(CFG.gia[goi])+" đ"; };
  $$("#gate .copy").forEach(el=>el.onclick=()=>{ navigator.clipboard?.writeText(el.dataset.c); toast("Đã sao chép"); });
  $("#baoCK").onclick = async ()=>{
    try{ await setDoc(doc(fdb,"renewalRequests", UID+"__"+CFG.app), { uid:UID, app:CFG.app,
          email:auth.currentUser?.email||"", goi, soTien:CFG.gia[goi], noiDung,
          trangThai:"cho", tao:new Date() });
      toast("Đã gửi. Bên mình đối soát và mở lại trong ngày.");
    }catch(e){ toast("Chưa gửi được, gọi hotline giúp mình",1); }
  };
  $("#ktLai").onclick = async ()=>{ LIC = await docGiayPhep(); conHan(LIC) ? khoiDong() : toast("Hạn dùng chưa được cập nhật",1); };
  $("#raNgoai").onclick = ()=> signOut(auth);
}

/* ------------------------------ KHỞI ĐỘNG ------------------------------ */
const CHIA = new URLSearchParams(location.search).get("ct");   // link tra cứu của tài xế
onAuthStateChanged(auth, async u=>{
  if(CHIA) return;
  if(!u){ UID=null; $("#topbar").style.display="none"; $("#nav").style.display="none"; return congDangNhap(); }
  UID = u.uid;
  moCong(`<p class="mo" style="text-align:center;padding:40px 0">Đang tải dữ liệu…</p>`);
  try{
    LIC = await docGiayPhep();
    if(!conHan(LIC)) return congGiaHan();
    await STORE.nap();
    khoiDong();
  }catch(e){ console.error(e); congDangNhap("Không tải được dữ liệu: " + (e.message||e)); }
});

/* =================== TIỆN ÍCH GIAO DIỆN =================== */
function moSheet(t, b, f){ $("#shT").textContent=t; $("#shB").innerHTML=b; $("#shF").innerHTML=f||"";
  $("#mask").classList.add("on"); $("#sheet").classList.add("on"); }
function dongSheet(){ $("#mask").classList.remove("on"); $("#sheet").classList.remove("on"); }
$("#mask").onclick = dongSheet; $("#shX").onclick = dongSheet;
const val = id => ($("#"+id)?.value ?? "").trim();
const tenXe = id => DB.xe.find(x=>x.id===id)?.bienSo || "";
const tenTX = id => DB.tx.find(x=>x.id===id)?.ten || "—";
const tenKH = id => DB.kh.find(x=>x.id===id)?.ten || "—";
const bien = (b,c)=> b ? `<span class="plate ${c||''}">${esc(b)}</span>` : `<span class="chip">chưa gán xe</span>`;
const TT = { kh:["Đã lên lịch","run"], chay:["Đang chạy","warn"], xong:["Hoàn thành","ok"], huy:["Đã hủy",""] };
const LOAI_HD = {chuyen:"Thuê chuyến", thang:"Hợp đồng tháng", dua:"Đưa đón CB-CNV / học sinh", dulich:"Du lịch", cuoi:"Đám cưới", tang:"Đám tang"};

const optDS = (ds,v,f)=> `<option value="">— chọn —</option>` + ds.map(o=>`<option value="${o.id}"${o.id===v?" selected":""}>${esc(f(o))}</option>`).join("");

/* =================== CẢNH BÁO GIẤY TỜ =================== */
function hetHan(){
  const r=[], h=hnay();
  DB.xe.filter(x=>!x.ngung).forEach(x=>[["dangKiem","đăng kiểm"],["baoHiem","bảo hiểm"],["phuHieu","phù hiệu XE HỢP ĐỒNG"]]
    .forEach(([k,t])=>{ if(x[k]){ const c=cachNgay(x[k],h); if(c<=15) r.push({c, m:`${x.bienSo}: ${t} ${c<0?`đã hết hạn ${-c} ngày`:`còn ${c} ngày`}`}); } }));
  DB.tx.filter(t=>!t.ngung).forEach(t=>[["hanGPLX","giấy phép lái xe"],["hanSK","giấy khám sức khỏe"]]
    .forEach(([k,n])=>{ if(t[k]){ const c=cachNgay(t[k],h); if(c<=15) r.push({c, m:`${t.ten}: ${n} ${c<0?`đã hết hạn ${-c} ngày`:`còn ${c} ngày`}`}); } }));
  return r.sort((a,b)=>a.c-b.c);
}
function veCanhBao(){
  const ds = hetHan(), n = ds.filter(x=>x.c<0).length;
  $("#canhBao").innerHTML = !ds.length ? "" :
    `<div class="alert ${n?'':'warn'}"><span class="ic">${n?'⛔':'⚠️'}</span><div><b>${n?`${n} giấy tờ đã hết hạn`:"Giấy tờ sắp hết hạn"}</b>
      ${ds.slice(0,4).map(x=>`<div class="sm">${esc(x.m)}</div>`).join("")}
      ${ds.length>4?`<div class="xs mo">…và ${ds.length-4} mục khác</div>`:""}</div></div>`;
  const b = $('.nav button[data-v="xe"]'); b.querySelector(".badge")?.remove();
  if(n) b.insertAdjacentHTML("beforeend", `<span class="badge">${n}</span>`);
}

/* =================== 1. LỊCH ĐIỀU XE =================== */
let mocLich = 0;
function trungLich(c){
  if(!c.xeId || c.trangThai==="huy") return false;
  return DB.chuyen.some(k=> k.id!==c.id && k.xeId===c.xeId && k.trangThai!=="huy"
      && dt(k.batDau) < dt(c.ketThuc||c.batDau) && dt(c.batDau) < dt(k.ketThuc||k.batDau));
}
function veLich(){
  const d0 = new Date(); d0.setDate(d0.getDate()+mocLich*7); d0.setHours(0,0,0,0);
  const ngay = [...Array(7)].map((_,i)=>{ const d=new Date(d0); d.setDate(d.getDate()+i); return d.toISOString().slice(0,10); });
  const xe = DB.xe.filter(x=>!x.ngung);
  let h = `<div class="lich-head"><div class="fix"><span class="xs mo">${ngayVN(ngay[0]).slice(0,5)} – ${ngayVN(ngay[6]).slice(0,5)}</span></div>`;
  ngay.forEach(n=>{ const d=dt(n); h+=`<div class="cell${n===hnay()?" today":""}"><b>${d.getDate()}</b>${THU[d.getDay()]}</div>`; });
  h += `</div>`;
  if(!xe.length) h += `<div class="empty"><b>Chưa có xe nào</b>Thêm xe ở tab “Xe &amp; TX” để bắt đầu xếp lịch.</div>`;
  xe.forEach(x=>{
    h += `<div class="lane"><div class="fix">${bien(x.bienSo,"sm")}<span class="xs mo">${x.soCho||"?"} chỗ</span></div>`;
    ngay.forEach(n=>{
      const ds = DB.chuyen.filter(c=>c.xeId===x.id && (c.batDau||"").slice(0,10)===n);
      h += `<div class="cell">` + ds.map(c=>{
        const k = c.trangThai==="xong"?"done":c.trangThai==="huy"?"cancel":trungLich(c)?"clash":"";
        return `<div class="blk ${k}" data-ct="${c.id}"><b>${gioVN(c.batDau)} ${esc(c.diemCuoi||c.lotrinh||"")}</b>${esc(tenTX(c.txId).split(" ").pop())}</div>`;
      }).join("") + `</div>`;
    });
    h += `</div>`;
  });
  $("#lichBody").innerHTML = h;
  $$("#lichBody .blk").forEach(b=>b.onclick=()=>xemChuyenNoiBo(b.dataset.ct));
}
function veHomNay(){

      <div class="t">${gioVN(c.batDau)} · ${esc(c.diemDau||"")} → ${esc(c.diemCuoi||"")}</div>

    </div><div class="r">${bien(tenXe(c.xeId),"sm")}<div style="margin-top:5px"><span class="chip ${t[1]}">${t[0]}</span></div></div></div>`;

/* =================== 2. HỢP ĐỒNG =================== */

  const ds = DB.hopdong.filter(h=> !q || [h.ma,tenKH(h.khId),tenXe(h.xeId),h.diemCuoi].join(" ").toLowerCase().includes(q))
                       .sort((a,b)=>(b.batDau||"").localeCompare(a.batDau||""));
  $("#dsHD").innerHTML = ds.length ? ds.map(h=>`
    <div class="item" data-hd="${h.id}"><div class="l">
      <div class="t">${esc(h.ma||"HĐ")} · ${esc(tenKH(h.khId))}</div>
      <div class="d">${ngayVN(h.batDau)} → ${ngayVN(h.ketThuc)} · ${esc(h.diemDau||"")} → ${esc(h.diemCuoi||"")}</div>
      <div class="d">${esc(LOAI_HD[h.loai]||"")} · ${h.soKhach||0} khách · ${h.cuLy||0} km</div>

      <div class="f"><label>Số hành khách</label><input id="hSk" type="number" inputmode="numeric" value="${m.soKhach||""}"></div>

function veChuyen(){
  const l = $("#locChuyen").value, h = hnay();

  if(l==="0") ds = ds.filter(c=>(c.batDau||"").slice(0,10)===h);
  else if(l!=="all"){ const n=num(l); ds = n>=0 ? ds.filter(c=>{const k=cachNgay(c.batDau,h); return k>=0&&k<=n;})
                                                : ds.filter(c=>{const k=cachNgay(c.batDau,h); return k<0&&k>=n;}); }
  ds.sort((a,b)=>(a.batDau||"").localeCompare(b.batDau||""));
  $("#dsChuyen").innerHTML = ds.length ? ds.map(c=>{
    const t=TT[c.trangThai]||TT.kh, hd=DB.hopdong.find(x=>x.id===c.hdId);

/* =================== 4. XE / TÀI XẾ / KHÁCH =================== */
let tabXe = "xe";

  const h = hnay();
  const han = (d)=>{ if(!d) return `<span class="chip">chưa nhập</span>`; const c=cachNgay(d,h);
    return `<span class="chip ${c<0?"bad":c<=15?"warn":"ok"}">${ngayVN(d)}</span>`; };
  if(tabXe==="xe"){
    $("#dsXe").innerHTML = DB.xe.length ? DB.xe.map(x=>`
      <div class="item" data-i="${x.id}"><div class="l">
        <div class="rowf">${bien(x.bienSo)}<span class="sm mo">${x.soCho||"?"} chỗ · ${esc(x.loai||"")}</span></div>
        <div class="d" style="margin-top:6px">Đăng kiểm ${han(x.dangKiem)} Bảo hiểm ${han(x.baoHiem)} Phù hiệu ${han(x.phuHieu)}</div>
      </div></div>`).join("") : `<div class="empty"><b>Chưa có xe</b>Bấm + để khai xe đầu tiên.</div>`;
    $$("#dsXe .item").forEach(b=>b.onclick=()=>formXe(DB.xe.find(x=>x.id===b.dataset.i)));
  } else if(tabXe==="tx"){
    $("#dsXe").innerHTML = DB.tx.length ? DB.tx.map(t=>`
      <div class="item" data-i="${t.id}"><div class="l">
        <div class="t">${esc(t.ten)} <span class="chip">${esc(t.hangGPLX||"?")}</span></div>
        <div class="d">${esc(t.sdt||"")}</div>
        <div class="d" style="margin-top:4px">GPLX ${han(t.hanGPLX)} Sức khỏe ${han(t.hanSK)}</div>
      </div></div>`).join("") : `<div class="empty"><b>Chưa có tài xế</b>Bấm + để thêm.</div>`;
    $$("#dsXe .item").forEach(b=>b.onclick=()=>formTX(DB.tx.find(x=>x.id===b.dataset.i)));
  } else {
    $("#dsXe").innerHTML = DB.kh.length ? DB.kh.map(k=>{
      const no = congNo(k.id);
      return `<div class="item" data-i="${k.id}"><div class="l">
        <div class="t">${esc(k.ten)}</div><div class="d">${esc(k.sdt||"")}${k.mst?" · MST "+esc(k.mst):""}</div>
      </div><div class="r"><div class="money ${no>0?"out":""}">${tien(no)}</div><div class="xs mo">còn nợ</div></div></div>`;
    }).join("") : `<div class="empty"><b>Chưa có khách hàng</b>Bấm + để thêm bên thuê vận tải.</div>`;
    $$("#dsXe .item").forEach(b=>b.onclick=()=>formKH(DB.kh.find(x=>x.id===b.dataset.i)));
  }
}

const trongThang = (d,t) => (d||"").slice(0,7)===t;
function congNo(khId){
  const hd = DB.hopdong.filter(h=>h.khId===khId && h.trangThai!=="huy").reduce((s,h)=>s+num(h.giaTri),0);
  const thu = DB.thuchi.filter(t=>t.loai==="thu" && t.khId===khId).reduce((s,t)=>s+num(t.soTien),0);
  return hd - thu;
}
function veTien(){
  const t = $("#thangBC").value || hnay().slice(0,7);
  const ct = DB.chuyen.filter(c=>trongThang(c.batDau,t) && c.trangThai!=="huy");
  const dt_ = ct.reduce((s,c)=>s+num(c.doanhThu),0);
  const cp = DB.chiphi.filter(x=>trongThang(x.ngay,t)).reduce((s,x)=>s+num(x.soTien),0)
           + DB.thuchi.filter(x=>x.loai==="chi" && trongThang(x.ngay,t)).reduce((s,x)=>s+num(x.soTien),0);
  $("#bcTong").innerHTML = `<div class="card"><div class="kv"><span class="k">Số chuyến</span><span class="v num">${ct.length}</span></div>
    <div class="kv"><span class="k">Doanh thu</span><span class="v num" style="color:var(--chay)">${tien(dt_)} đ</span></div>
    <div class="kv"><span class="k">Chi phí</span><span class="v num" style="color:var(--canh)">${tien(cp)} đ</span></div>
    <div class="kv"><span class="k">Còn lại</span><span class="v num" style="color:var(--bien);font-size:17px">${tien(dt_-cp)} đ</span></div></div>`;
  const rows = DB.xe.map(x=>{
    const c = ct.filter(k=>k.xeId===x.id);
    const d = c.reduce((s,k)=>s+num(k.doanhThu),0);
    const p = DB.chiphi.filter(k=>k.xeId===x.id && trongThang(k.ngay,t)).reduce((s,k)=>s+num(k.soTien),0);
    return {x,n:c.length,d,p};
  }).filter(r=>r.n||r.d||r.p).sort((a,b)=>(b.d-b.p)-(a.d-a.p));
  $("#bcXe").innerHTML = rows.length ? rows.map(r=>`<div class="item" style="cursor:default"><div class="l">
      <div class="rowf">${bien(r.x.bienSo,"sm")}<span class="xs mo">${r.n} chuyến</span></div>
      <div class="d">Thu ${tien(r.d)} · Chi ${tien(r.p)}</div></div>
      <div class="r"><div class="money ${r.d-r.p>=0?"in":"out"}">${tien(r.d-r.p)}</div></div></div>`).join("")
    : `<div class="empty">Tháng này chưa có số liệu.</div>`;
  const no = DB.kh.map(k=>({k, n:congNo(k.id)})).filter(x=>x.n>0).sort((a,b)=>b.n-a.n);
  $("#bcNo").innerHTML = no.length ? no.map(x=>`<div class="item" style="cursor:default"><div class="l">
      <div class="t">${esc(x.k.ten)}</div><div class="d">${esc(x.k.sdt||"")}</div></div>
      <div class="r"><div class="money out">${tien(x.n)}</div></div></div>`).join("")
    : `<div class="empty">Không có công nợ.</div>`;
  const pt = DB.thuchi.filter(p=>trongThang(p.ngay,t)).sort((a,b)=>(b.ngay||"").localeCompare(a.ngay||""));
  $("#dsThuChi").innerHTML = pt.length ? pt.map(p=>`<div class="item" data-p="${p.id}"><div class="l">
      <div class="t">${esc(p.noiDung||(p.loai==="thu"?"Phiếu thu":"Phiếu chi"))}</div>
      <div class="d">${ngayVN(p.ngay)}${p.khId?" · "+esc(tenKH(p.khId)):""}</div></div>
      <div class="r"><div class="money ${p.loai==="thu"?"in":"out"}">${p.loai==="thu"?"+":"−"}${tien(p.soTien)}</div></div></div>`).join("")
    : `<div class="empty">Chưa có phiếu nào trong tháng.</div>`;
  $$("#dsThuChi .item").forEach(b=>b.onclick=()=>formThuChi(DB.thuchi.find(x=>x.id===b.dataset.p)));
}

async function taoLinkTaiXe(c){
  const h = DB.hopdong.find(x=>x.id===c.hdId)||{}, k = DB.kh.find(x=>x.id===h.khId)||{}, x = DB.xe.find(x=>x.id===c.xeId)||{};
  const token = c.share || (nid()+nid());
  const goi = {
    dv:{ ten:CH.ten||"", sdt:CH.sdt||"", mst:CH.mst||"", diaChi:CH.diaChi||"", daiDien:CH.daiDien||"", khanCap:CH.khanCap||"" },
    hd:{ ma:h.ma||"", loai:LOAI_HD[h.loai]||"", ngayKy:h.ngayKy||"", batDau:c.batDau||"", ketThuc:c.ketThuc||"",
         diemDau:c.diemDau||h.diemDau||"", diemCuoi:c.diemCuoi||h.diemCuoi||"", diemDon:h.diemDon||[],
         cuLy:h.cuLy||0, soKhach:h.soKhach||(c.hanhKhach||[]).length },
    ben:{ ten:k.ten||"", cccd:k.cccd||"", diaChi:k.diaChi||"", sdt:k.sdt||"" },
    xe:{ bienSo:x.bienSo||"", soCho:x.soCho||"" },
    tx:{ ten:tenTX(c.txId) },
    hk:(c.hanhKhach||[]).map(p=>({ten:p.ten||"", sdt:p.sdt||""})),
    hetHan: themNgay((c.ketThuc||c.batDau||hnay()).slice(0,10), 3),
    ownerUid: UID
  };
  try{
    await setDoc(doc(fdb,"shares_"+CFG.app, token), goi);
    if(!c.share){ c.share = token; STORE.luu("chuyen",c); STORE.ghi(true); }
    const url = location.origin + location.pathname + "?ct=" + token;
    moSheet("Link tra cứu cho tài xế", `
      <p class="sm mo">Gửi link này cho tài xế qua Zalo. Mở được trên điện thoại, không cần đăng nhập —
      dùng để xuất trình hợp đồng và danh sách hành khách khi bị kiểm tra.</p>
      <div class="f"><input id="lk" value="${esc(url)}" readonly></div>
      <p class="xs mo">Link tự hết hiệu lực sau ngày ${ngayVN(goi.hetHan)}. Bấm lại nút này sau khi sửa danh sách hành khách để cập nhật.</p>
    `, `<button class="btn" id="lkMo">Mở thử</button><button class="btn pri" id="lkCopy">Sao chép link</button>`);
    $("#lkCopy").onclick = ()=>{ navigator.clipboard?.writeText(url); toast("Đã sao chép — dán vào Zalo cho tài xế"); };
    $("#lkMo").onclick = ()=> window.open(url,"_blank");
  }catch(e){ console.error(e); toast("Chưa tạo được link — kiểm tra quy tắc Firestore",1); }
}

/* ---- Icon + manifest sinh ngay trong trang: kho chỉ cần index.html và sw.js ----
   start_url và scope phải là địa chỉ TUYỆT ĐỐI, nếu để tương đối thì manifest kiểu blob:
   sẽ báo lỗi và điện thoại không cài được app. Icon phải là PNG 192 và 512. */
function veIcon(sz, maskable){
  const c = document.createElement("canvas"); c.width = c.height = sz;
  const g = c.getContext("2d");
  const bo = (x,y,w,h,r)=>{ if(g.roundRect){ g.beginPath(); g.roundRect(x,y,w,h,r); } else {
      g.beginPath(); g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r);
      g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); } };
  g.fillStyle = "#12151a";
  if(maskable) g.fillRect(0,0,sz,sz); else { bo(0,0,sz,sz,sz*0.22); g.fill(); }
  const tl = maskable ? 0.62 : 0.76;                       // vùng an toàn cho icon maskable
  const pw = sz*tl, ph = pw*0.42, x = (sz-pw)/2, y = (sz-ph)/2;
  bo(x, y, pw, ph, ph*0.16); g.fillStyle = "#f5c518"; g.fill();
  g.lineWidth = Math.max(2, sz*0.016); g.strokeStyle = "#101010"; g.stroke();
  g.fillStyle = "#101010"; g.textAlign = "center"; g.textBaseline = "middle";
  g.font = `700 ${Math.round(ph*0.6)}px "Roboto Condensed","Arial Narrow",system-ui,sans-serif`;
  g.fillText("HĐ", sz/2, y + ph*0.53);
  return c.toDataURL("image/png");
}
try{
  const i192 = veIcon(192), i512 = veIcon(512), iMask = veIcon(512, true);
  const goc = location.origin + location.pathname.replace(/[^/]*$/, "");
  const mf = {
    name:"Xe Hợp Đồng — quản lý chuyến & hợp đồng", short_name:"Xe Hợp Đồng",
    description:"Lập hợp đồng vận chuyển, xếp lịch điều xe, danh sách hành khách và thu chi cho nhà xe hợp đồng.",
    start_url:goc, scope:goc, id:goc, display:"standalone", orientation:"portrait",
    background_color:"#12151a", theme_color:"#12151a", lang:"vi",
    icons:[ {src:i192, sizes:"192x192", type:"image/png", purpose:"any"},
            {src:i512, sizes:"512x512", type:"image/png", purpose:"any"},
            {src:iMask, sizes:"512x512", type:"image/png", purpose:"maskable"} ]
  };
  $("#mfLink").href = URL.createObjectURL(new Blob([JSON.stringify(mf)], {type:"application/manifest+json"}));
  $("#icLink").href = i192; $("#icApple").href = i192;
}catch(e){ console.warn("Không dựng được manifest:", e); }
